<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0B132B"/>
  <text x="32" y="44" text-anchor="middle" font-family="sans-serif" font-weight="800" font-style="italic" font-size="30" fill="white" filter="url(#glow)" style="text-shadow: 0 0 8px rgba(0,210,255,0.7)">VB</text>
</svg>
